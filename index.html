.navbar {

.portfolio {

}

}

  height: 350px;
}
    
.form {

.footer {

.social {

  margin-right: 5px;

}
    
.social:hover {
  color:white;

}      
</style>

<script>

$(document).ready(function() {

  });
    
  $("#portfolio").click(function() {
    $('html, body').animate({
      scrollTop: $(".portfolio").offset().top

  }); 
    
  $("#contact").click(function() {
    $('html, body').animate({
